<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Issu Tracker</title>
    <!-- goggle font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- font awasome cdn and link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisy and tailwind cdn link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header class="mt-30">
        <div class="header-container bg-white w-1/4 mx-auto shadow-2xl rounded-2xl">
            <div class="p-7">
                <div class="space-y-2 mx-auto text-center mb-5">
                    <img class="mx-auto" src="./assets/github-logo.png" alt="" />
                    <h2 class="text-3xl font-semibold">GitHub Issues Tracker</h2>
                    <p class="text-gray-400">Sign in to manage your issues</p>
                </div>

                <div class="pl-10 pb-10">
                    <fieldset class="fieldset w-xs p-4">
                        <label class="label font-semibold">Username</label>
                        <input id="input-name" type="email" class="input" placeholder="Enter username" />
                        <p class="text-purple-500">Default: admin</p>

                        <label class="label font-semibold">Password</label>
                        <input id="input-password" type="password" class="input" placeholder="Enter password" />
                        <p class="text-purple-500">Default: admin123</p>
                        <button id="sign-btn" class="btn btn-primary mt-4">
                            Sign in
                        </button>
                        <div class="flex items-center gap-3 my-4">
                            <div class="flex-1 border-t"></div>
                            <span class="text-gray-500 text-sm">OR</span>
                            <div class="flex-1 border-t"></div>
                        </div>
                        <p class="text-center">Demo Credentials:</p>
                        <div class="w-full border-none text-center bg-[#F8FAFC] p-3">
                            <p class="font-semibold">Username: admin</p>

                            <p class="font-semibold">Password: admin123</p>
                        </div>
                    </fieldset>
                </div>
            </div>
        </div>
    </header>

    <script src="./js/script.js"></script>
    <script src="./js/git.js"></script>
</body>

</html>
