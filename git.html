<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- goggle font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- font awasome cdn and link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisy and tailwind cdn link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <navber>
        <div class="grid grid-cols-2 bg-base-200 border border-0 shadow md w-full p-5">
            <div class="flex justify-center items-center w-1/3">
                <img class="w-10 pr-3" src="./assets/github-logo.png" alt="" />
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            </div>
            <div class="w-full flex justify-center items-center space-x-2 ml-25">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search Issu" />
                </label>
                <button class="btn btn-primary">+ New Issu</button>
            </div>
        </div>
    </navber>

    <section>
        <div class=" mt-5 w-[70%] mx-auto bg-base-200 shadow p-5">
            <button  id="all-btn"class="btn btn-primary">All</button>

            <button  id="open-btn" class="btn btn-primary">Open</button>

            <button id="close-btn" class="btn btn-primary">Closed</button>
        </div>
    </section>

    <main>
         <div class="child-sec w-[70%] mx-auto bg-base-200 shadow  mt-5 flex justify-between items-center p-5">
            <div class="flex justify-between items-center">
                <img src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="pl-2 text-[20px] font-semibold" id="total">50 Issues</h2>
                    <p class="pl-2">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2"> <span class="h-3 w-3 rounded-full bg-green-500"></span>
                    <span>Open</span>
                </div>
                <div class="flex items-center gap-2"> <span class="h-3 w-3 rounded-full bg-purple-500"></span>
                    <span>Closed</span>
                </div>
            </div>
        </div>
    
    <section id="perent-sec" class="w-[70%] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 mt-10 p-3 gap-4 ">
        
    </section> 
     </main>
     

 <dialog id="myModall" class="modal">
  <div class="modal-box">
    <h3 class="text-lg font-bold">hellow</h3>
    <p class="py-4">Press ESC key or click the button below to close</p>
    <div class="modal-action">
      <form method="dialog">
         <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>



 <script src="./js/git.js"></script>
</body>

</html>
