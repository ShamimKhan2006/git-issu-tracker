<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-base-100">
    <nav>
      <div class="grid grid-cols-2 bg-base-200 shadow w-full p-5">
        <div class="flex items-center gap-2">
          <img class="w-10" src="./assets/github-logo.png" />
          <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex justify-end gap-3">
          <input
            id="searchInput"
            type="text"
            placeholder="Search Issue"
            class="input input-bordered"
          />

          <button class="btn btn-primary" id="newIssuBtn"> + New issu</button>
        </div>
      </div>
    </nav>

    <section>
      <div
        id="buttons"
        class="mt-6 w-[70%] mx-auto bg-base-200 shadow p-5 flex gap-3"
      >
        <button id="all-btn" class="btn btn-primary">All</button>
        <button id="open-btn" class="btn">Open</button>
        <button id="close-btn" class="btn">Closed</button>
      </div>
    </section>
    <div
      id="buttons"
      class="mt-6 w-[70%] mx-auto bg-base-200 shadow p-5 flex gap-3"
    >
      <div
        class="flex justify-between items-center w-full md:flex flex-wrap w-[50%]"
      >
        <div class="flex justify-center items-center">
          <img class="w-15" src="./assets/Aperture.png" alt="" />

          <div>
            <h1 id="countissu" class="font-bold text-2xl pl-5 text-left">
              50 Issues
            </h1>
            <p class="pl-5 text-left">Track and manage your Project issues</p>
          </div>
        </div>

        <div>
          <div class="flex gap-6 items-center">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-teal-600 rounded-full"></span>
              <p class="font-medium text-slate-800">Open</p>
            </div>

            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-purple-600 rounded-full"></span>
              <p class="font-medium text-slate-800">Closed</p>
            </div>
          </div>

        </div>
      </div>
    </div>

    <section
      id="status-sec"
      class="w-[70%] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 mt-8 gap-5 p-3"
    ></section>

    <script src="./js/git.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
